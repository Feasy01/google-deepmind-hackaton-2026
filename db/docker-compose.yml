services:
  db:
    # This image has Postgres 16 and pgvector pre-installed!
    image: pgvector/pgvector:pg16
    container_name: hackathon_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: hackathonpassword
      POSTGRES_DB: vectordb
    ports:
      # Exposes the database to your local network
      - "0.0.0.0:5432:5432"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: hackathon_qdrant
    ports:
      - "0.0.0.0:6333:6333"
      - "0.0.0.0:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
